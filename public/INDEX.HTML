<!DOCTYPE html>
<html>
<head>
  <title>Live mysellauth.com Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-dark text-white">
  <div class="container py-4">
    <h1 class="mb-4">Live mysellauth.com Shops</h1>
    <div class="row row-cols-1 row-cols-md-3 g-4" id="shops-container"></div>
  </div>

  <script>
    const socket = io();
    const container = document.getElementById("shops-container");

    function addShop(shop) {
      const col = document.createElement("div");
      col.className = "col";
      const imgPath = "/screenshots/" + shop.replace(/\./g, "_") + ".png";
      col.innerHTML = `
        <div class="card bg-secondary text-white">
          <img src="${imgPath}" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">${shop}</h5>
          </div>
        </div>
      `;
      container.prepend(col);
    }

    // Load initial shops
    socket.on("initialShops", (shops) => shops.forEach(shop => addShop(shop)));

    // Add new shop live
    socket.on("newShop", (shop) => addShop(shop));
  </script>
</body>
</html>
